<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Modelist · Capabilities Overview for Ameriprise Advisors</title>
<style>
:root{
  --navy:#0C4160;--navy-dark:#082d42;--navy-deep:#051d2a;
  --ameriprise-navy:#0C3865;
  --terra:#68869A;--terra-dark:#4a6a7e;
  --accent-warm:#B4654A;
  --soft-black:#1A1A1A;--slate:#68869A;--slate-lt:#8fa5b4;
  --warm-gray:#DAD9D6;--blue-gray:#D7E0EB;--blue-gray-lt:#e8eef4;
  --bg:#FFFFFF;--bg-subtle:#FAFAF8;--bg-panel:#F5F3EF;
  --text:#1A1A1A;--text-muted:#5a6670;--text-faint:#8a939b;
  --border:#E7E5E0;--border-strong:#C8C5BD;--rule:#EDEBE6;
  --eq-color:#0C4160;--fi-color:#8f6f55;--alt-color:#3D6B5E;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:var(--text);background:var(--bg);line-height:1.55;font-size:14.5px;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;font-feature-settings:'cv02','cv03','cv11','ss01'}
h1,h2,h3,h4,h5{color:var(--soft-black);font-weight:700;letter-spacing:-.015em;line-height:1.2}
h1{font-size:46px;font-weight:800;letter-spacing:-.028em}
h2{font-size:30px;font-weight:800;letter-spacing:-.02em}
h3{font-size:19px;font-weight:700}
h4{font-size:14.5px;font-weight:600}
p{color:var(--text)}
a{color:var(--navy);text-decoration:none}
a:hover{color:var(--terra)}
.display{font-weight:900;letter-spacing:.06em;text-transform:uppercase}
.eyebrow{font-size:10px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--slate)}
.eyebrow-terra{color:var(--terra)}
.rule{height:1px;background:var(--rule);border:0;margin:24px 0}
.mono{font-variant-numeric:tabular-nums;font-feature-settings:'tnum'}

/* App layout */
.app{display:grid;grid-template-columns:276px 1fr;min-height:100vh}
.sidebar{position:sticky;top:0;height:100vh;background:var(--soft-black);color:#fff;padding:30px 26px 22px;display:flex;flex-direction:column;overflow-y:auto;z-index:10}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-thumb{background:#3a3a3a}
.brand-stack{padding-bottom:24px;border-bottom:1px solid rgba(255,255,255,.08);margin-bottom:22px;display:flex;flex-direction:column;align-items:flex-start}
.brand-m{width:56px;height:auto;display:block;margin-bottom:12px}
.brand-wordmark-full{font-weight:900;letter-spacing:.22em;font-size:18px;color:#fff;line-height:1}
.brand-sub-stack{font-size:9px;color:var(--slate-lt);letter-spacing:.18em;text-transform:uppercase;margin-top:6px;font-weight:500}
.confidential-badge{font-size:9px;font-weight:700;letter-spacing:.22em;color:#E39D85;text-align:center;padding:9px 10px;border:1px solid rgba(180,101,74,.45);background:rgba(180,101,74,.12);margin-bottom:22px;text-transform:uppercase;line-height:1.3}
.sidebar-title{font-size:10px;color:var(--slate-lt);letter-spacing:.18em;text-transform:uppercase;margin-bottom:12px;font-weight:600}
.nav{list-style:none;flex:1}
.nav-item{display:grid;grid-template-columns:24px 1fr;align-items:center;gap:10px;padding:10px 12px 10px 12px;margin-left:-14px;font-size:13px;color:rgba(255,255,255,.6);cursor:pointer;border-left:2px solid transparent;transition:color .16s,border-color .16s,background .16s;font-weight:500;user-select:none}
.nav-item:hover{color:#fff;background:rgba(255,255,255,.03)}
.nav-item.active{color:#fff;border-left-color:var(--terra);background:rgba(104,134,154,.12)}
.nav-num{font-size:10px;color:var(--slate);font-weight:600;letter-spacing:.08em}
.nav-item.active .nav-num{color:var(--terra)}
.sidebar-foot{font-size:10px;color:var(--slate);letter-spacing:.12em;text-transform:uppercase;padding-top:18px;border-top:1px solid rgba(255,255,255,.08);line-height:1.6}
.sidebar-foot strong{color:rgba(255,255,255,.8);display:block;font-size:11px;margin-bottom:4px;letter-spacing:.14em}

/* Main content */
.main{min-width:0;background:var(--bg)}
.section{display:none;min-height:100vh;padding:68px 68px 96px;max-width:1280px;animation:fi .35s ease}
.section.active{display:block}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.section-head{margin-bottom:40px;padding-bottom:22px;border-bottom:1px solid var(--rule)}
.section-head .eyebrow{margin-bottom:12px;display:block}
.section-head .sub{color:var(--text-muted);font-size:16px;margin-top:14px;max-width:760px;line-height:1.55}

/* Blocks */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:28px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.mt-4{margin-top:32px}.mt-2{margin-top:18px}.mt-6{margin-top:48px}.mb-2{margin-bottom:16px}.mb-4{margin-bottom:28px}

.card{background:#fff;border:1px solid var(--border);padding:22px 24px;transition:border-color .18s,transform .18s}
.card-dark{background:var(--soft-black);color:#fff;border:0;padding:24px 26px}
.card-dark h3,.card-dark h4{color:#fff}
.card-navy{background:var(--navy);color:#fff;border:0;padding:24px 26px}
.card-navy h3,.card-navy h4{color:#fff}
.card-hover{cursor:pointer}
.card-hover:hover{border-color:var(--navy);transform:translateY(-1px)}
.card-accent{border-top:3px solid var(--terra)}

.stat{padding:18px 20px;background:var(--bg-panel);border:1px solid var(--border)}
.stat-label{font-size:10px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--slate);margin-bottom:8px}
.stat-value{font-size:26px;font-weight:800;color:var(--soft-black);letter-spacing:-.02em;font-variant-numeric:tabular-nums;line-height:1}
.stat-sub{font-size:11px;color:var(--text-muted);margin-top:6px;font-variant-numeric:tabular-nums}

.badge{display:inline-block;padding:3px 9px;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;background:var(--blue-gray);color:var(--navy)}
.badge-terra{background:rgba(104,134,154,.15);color:var(--terra-dark)}
.badge-slate{background:rgba(104,134,154,.15);color:var(--navy)}

/* Section 1: Intro (Hero) */
.ameriprise-intro-row{margin-bottom:28px;padding-bottom:22px;border-bottom:1px solid var(--rule);display:flex;justify-content:flex-start;align-items:center}
.intro-partner-badge{display:flex;align-items:center;gap:20px}
.intro-partner-badge .pb-lbl{font-size:10px;color:var(--slate);letter-spacing:.22em;text-transform:uppercase;font-weight:600}
.intro-partner-badge .ap-logo{height:52px;width:auto;display:block}
.ap-text{color:var(--ameriprise-navy)!important}

.hero{display:grid;grid-template-columns:1.1fr .9fr;gap:56px;align-items:start;margin-top:8px}
.hero-title{font-size:56px;line-height:1.05;letter-spacing:-.03em;font-weight:900;color:var(--soft-black);margin-bottom:20px}
.hero-title span{color:var(--terra)}
.hero-lead{font-size:17px;color:var(--text-muted);line-height:1.55;margin-bottom:28px;max-width:560px}
.hero-sublead{font-size:14px;color:var(--slate);letter-spacing:.02em;font-style:italic;font-weight:500;margin-top:-4px;margin-bottom:24px;max-width:560px}
.hero-sublead strong{font-style:normal;color:var(--navy);font-weight:700}
.hero-bullets{list-style:none;margin:20px 0 0 0}
.hero-bullets li{padding:12px 0;border-top:1px solid var(--rule);display:grid;grid-template-columns:auto 1fr;gap:14px;align-items:start;font-size:14px;line-height:1.5}
.hero-bullets li:last-child{border-bottom:1px solid var(--rule)}
.hero-bullets li .num{font-size:11px;color:var(--terra);font-weight:700;letter-spacing:.08em;padding-top:3px}
.hero-bullets li strong{color:var(--soft-black);font-weight:700}

.hero-right{background:var(--soft-black);color:#fff;padding:36px 34px;position:sticky;top:40px;min-height:480px;display:flex;flex-direction:column;justify-content:space-between}
.hero-right .tag{font-size:10px;color:var(--terra);letter-spacing:.2em;text-transform:uppercase;font-weight:600;margin-bottom:18px}
.hero-right h3{color:#fff;font-size:24px;line-height:1.25;margin-bottom:18px;font-weight:700;letter-spacing:-.01em}
.hero-right p{color:rgba(255,255,255,.75);font-size:14px;line-height:1.6}
.hero-right .foot{margin-top:28px;padding-top:20px;border-top:1px solid rgba(255,255,255,.1);font-size:10px;color:var(--slate-lt);letter-spacing:.12em;text-transform:uppercase}
.hero-right .foot strong{color:#fff;display:block;font-size:11px;margin-bottom:4px;letter-spacing:.14em}

/* Section 2: Why Modelist at Ameriprise */
.why-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px}
.why-card{background:#fff;border:1px solid var(--border);padding:24px 26px;transition:border-color .18s,background .18s,transform .18s;cursor:pointer;position:relative;overflow:hidden}
.why-card:hover{border-color:var(--navy);background:#fff}
.why-card .ix{position:absolute;top:18px;right:20px;font-size:10px;font-weight:600;letter-spacing:.14em;color:var(--text-faint)}
.why-card h3{font-size:17px;margin-bottom:10px;padding-right:40px;color:var(--navy)}
.why-card p{font-size:13.5px;line-height:1.55;color:var(--text-muted)}
.why-card .mini{margin-top:12px;font-size:11px;color:var(--slate);letter-spacing:.08em;text-transform:uppercase;font-weight:600}

/* Section 3: Process */
.stepper{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:36px}
.step-btn{background:#fff;border:1px solid var(--border);padding:18px 16px;cursor:pointer;text-align:left;transition:all .18s;position:relative}
.step-btn:hover{border-color:var(--navy);background:var(--bg-subtle)}
.step-btn.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.step-btn .n{font-size:10px;font-weight:700;letter-spacing:.14em;color:var(--terra);margin-bottom:10px;font-variant-numeric:tabular-nums}
.step-btn.active .n{color:rgba(255,255,255,.7)}
.step-btn .t{font-size:13.5px;font-weight:700;line-height:1.25;color:var(--soft-black)}
.step-btn.active .t{color:#fff}
.step-panel{background:var(--bg-panel);border-left:3px solid var(--terra);padding:36px 40px;min-height:220px}
.step-panel h3{font-size:22px;margin-bottom:14px;color:var(--navy)}
.step-panel p{color:var(--text);font-size:15px;line-height:1.65;max-width:720px}
.step-panel .addtl{margin-top:26px;padding:20px 22px;background:#fff;border:1px solid var(--border)}
.step-panel .addtl .lbl{font-size:10px;color:var(--terra);font-weight:700;letter-spacing:.16em;text-transform:uppercase;margin-bottom:12px}
.step-panel .addtl ul{list-style:none;margin:0}
.step-panel .addtl li{padding:10px 0;border-top:1px solid var(--rule);font-size:13.5px;display:grid;grid-template-columns:20px 1fr;gap:12px;align-items:start}
.step-panel .addtl li:first-child{border-top:0}
.step-panel .addtl li .m{color:var(--terra);font-weight:700;font-size:12px}
.step-panel .addtl li strong{color:var(--navy);font-weight:600}

/* Section 4: Series view */
.series-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:24px}
.series-tile{background:#fff;border:1px solid var(--border);padding:18px 18px 20px;cursor:pointer;transition:all .18s;position:relative}
.series-tile:hover{border-color:var(--navy);transform:translateY(-1px)}
.series-tile.active{background:var(--navy);border-color:var(--navy);color:#fff;box-shadow:0 8px 24px -12px rgba(12,65,96,.45)}
.series-tile .sname{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--slate);margin-bottom:8px;line-height:1.3}
.series-tile.active .sname{color:rgba(255,255,255,.8)}
.series-tile .sret{font-size:26px;font-weight:800;color:var(--soft-black);letter-spacing:-.02em;font-variant-numeric:tabular-nums;line-height:1;margin-bottom:4px}
.series-tile.active .sret{color:#fff}
.series-tile .sdelta{font-size:11px;color:var(--terra);font-weight:600;font-variant-numeric:tabular-nums}
.series-tile.active .sdelta{color:#ffc2a6}
.series-tile .srisk{margin-top:10px;padding-top:10px;border-top:1px solid var(--rule);font-size:10px;color:var(--text-muted);letter-spacing:.06em;text-transform:uppercase;font-weight:600}
.series-tile.active .srisk{border-color:rgba(255,255,255,.15);color:rgba(255,255,255,.6)}

.series-kpi-row{display:grid;grid-template-columns:repeat(6,1fr);gap:0;background:#fff;border:1px solid var(--border);margin-bottom:24px}
.series-kpi-row .kpi{padding:18px 20px;border-right:1px solid var(--border)}
.series-kpi-row .kpi:last-child{border-right:0}
.series-kpi-row .kpi .l{font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--slate);margin-bottom:6px}
.series-kpi-row .kpi .v{font-size:22px;font-weight:800;letter-spacing:-.015em;color:var(--soft-black);font-variant-numeric:tabular-nums;line-height:1}
.series-kpi-row .kpi .b{font-size:11px;color:var(--text-muted);margin-top:5px;font-variant-numeric:tabular-nums}
.series-kpi-row .kpi .d{color:var(--terra);font-weight:700}

.series-annual-wrap{background:var(--bg-subtle);border:1px solid var(--border);padding:24px 28px;margin-top:24px;margin-bottom:24px}
.series-annual-wrap .hd{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px}
.series-annual-wrap h4{font-size:12px;color:var(--slate);letter-spacing:.14em;text-transform:uppercase;font-weight:600}
.series-annual-wrap .sw{font-size:11px;color:var(--text-muted);display:flex;gap:16px}
.series-annual-wrap .sw span{display:inline-flex;align-items:center;gap:6px}
.series-annual-wrap .sw .dot{width:10px;height:10px;display:inline-block}

.chart-footnote{font-size:10.5px;color:var(--text-muted);margin-top:14px;line-height:1.55;padding-top:12px;border-top:1px solid var(--rule);font-style:italic}
.chart-footnote strong{color:var(--soft-black);font-weight:600;font-style:normal}

/* Dual-panel chart canvas for rolling + annualized analysis */
.chart-dual-canvas{position:relative;width:100%;height:440px}
.chart-dual-canvas svg{width:100%;height:100%;display:block;overflow:visible}

/* Regime analysis */
.regime-timeline{position:relative;width:100%;height:120px;margin-bottom:20px}
.regime-timeline svg{width:100%;height:100%;display:block;overflow:visible}
.regime-table-wrap{background:#fff;border:1px solid var(--border);overflow-x:auto;margin-bottom:14px}
.regime-table{width:100%;border-collapse:collapse;font-size:12.5px;font-variant-numeric:tabular-nums}
.regime-table thead th{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--slate);padding:12px 14px;background:var(--bg-subtle);border-bottom:1px solid var(--border-strong);text-align:right;white-space:nowrap}
.regime-table thead th:first-child,.regime-table thead th:nth-child(2){text-align:left}
.regime-table tbody td{padding:11px 14px;border-bottom:1px solid var(--rule);text-align:right}
.regime-table tbody td:first-child,.regime-table tbody td:nth-child(2){text-align:left}
.regime-table tbody tr:hover td{background:var(--bg-subtle)}
.regime-table .regime-pill{display:inline-block;padding:3px 10px;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;border-radius:2px}
.regime-table .regime-pill.bull{background:rgba(12,65,96,.12);color:var(--navy)}
.regime-table .regime-pill.bear{background:rgba(180,101,74,.16);color:#93513b}
.regime-table .capture-good{color:var(--navy);font-weight:700}
.regime-table .capture-bad{color:#93513b;font-weight:700}
.regime-table .capture-neutral{color:var(--text);font-weight:600}

.example-footer{background:var(--bg-panel);border:1px solid var(--border);border-left:3px solid var(--terra);padding:22px 26px;margin-top:32px}
.example-footer p{font-size:12px;color:var(--text);line-height:1.65}
.example-footer strong{color:var(--navy);font-weight:700}

.holdings-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:0;background:#fff;border:1px solid var(--border);margin-bottom:18px}
.holdings-summary .hs-item{padding:16px 22px;border-right:1px solid var(--border)}
.holdings-summary .hs-item:last-child{border-right:0}
.holdings-summary .hs-label{font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--slate);margin-bottom:6px}
.holdings-summary .hs-value{font-size:22px;font-weight:800;letter-spacing:-.015em;color:var(--soft-black);font-variant-numeric:tabular-nums;line-height:1}
.annual-bars{width:100%;overflow:hidden}

.series-chart-wrap{background:var(--bg-subtle);border:1px solid var(--border);padding:24px 28px;margin-bottom:0}
.series-chart-wrap .hd{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:18px}
.series-chart-wrap h4{font-size:12px;color:var(--slate);letter-spacing:.14em;text-transform:uppercase;font-weight:600}
.series-chart-wrap .sw{font-size:11px;color:var(--text-muted);display:flex;gap:16px}
.series-chart-wrap .sw span{display:inline-flex;align-items:center;gap:6px}
.series-chart-wrap .sw .dot{width:10px;height:10px;display:inline-block}

.series-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:20px}
.series-table th,.series-table td{padding:11px 12px;text-align:right;border-bottom:1px solid var(--rule);font-variant-numeric:tabular-nums}
.series-table th{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--slate);border-bottom:1px solid var(--border-strong)}
.series-table th:first-child,.series-table td:first-child{text-align:left;font-weight:600;color:var(--soft-black)}
.series-table tr:hover td{background:var(--bg-subtle)}
.series-table tr.row-active td{background:rgba(12,65,96,.06);font-weight:700}
.series-table tr.row-active td:first-child{color:var(--navy)}

/* Section 5: Example Model */
.ex-head{display:grid;grid-template-columns:1fr auto;gap:40px;align-items:end;margin-bottom:32px;padding-bottom:26px;border-bottom:1px solid var(--rule)}
.ex-head h2{font-size:34px;margin-bottom:10px}
.ex-head .bd{display:flex;align-items:center;gap:24px;font-size:12px;color:var(--slate);letter-spacing:.1em;text-transform:uppercase}
.ex-head .bd .v{color:var(--soft-black);font-weight:800;font-size:22px;letter-spacing:-.01em;font-variant-numeric:tabular-nums;text-transform:none}
.ex-desc{color:var(--text-muted);max-width:820px;line-height:1.6;font-size:14.5px}

.kpi-row{display:grid;grid-template-columns:repeat(6,1fr);gap:0;background:#fff;border:1px solid var(--border);margin:32px 0 16px}
.kpi{padding:18px 22px;border-right:1px solid var(--border)}
.kpi:last-child{border-right:0}
.kpi .l{font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--slate);margin-bottom:6px}
.kpi .v{font-size:22px;font-weight:800;letter-spacing:-.015em;color:var(--soft-black);font-variant-numeric:tabular-nums;line-height:1}
.kpi .b{font-size:11px;color:var(--text-muted);margin-top:4px;font-variant-numeric:tabular-nums}
.kpi .d{color:var(--terra);font-weight:600}
.kpi .d.neg{color:#a84432}

.panel{background:var(--bg-subtle);border:1px solid var(--border);padding:24px 26px}
.panel-hd{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:18px}
.panel-hd h3{font-size:15px;letter-spacing:-.005em}
.panel-hd .tag{font-size:10px;color:var(--slate);letter-spacing:.14em;text-transform:uppercase;font-weight:600}

/* Backtest chart */
.chart-canvas{position:relative;width:100%;height:360px}
.chart-canvas svg{width:100%;height:100%;display:block;overflow:visible}
.legend{display:flex;gap:22px;font-size:12px;margin-top:14px;color:var(--text-muted);font-weight:500}
.legend .dot{width:12px;height:3px;display:inline-block;margin-right:8px;vertical-align:middle}

/* Annual returns bars */
.ar-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:12px}
.ar-table th,.ar-table td{padding:5px 8px;text-align:right;border-bottom:1px solid var(--rule);font-variant-numeric:tabular-nums}
.ar-table th{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--slate);font-weight:600;border-bottom:1px solid var(--border-strong)}
.ar-table td:first-child{text-align:left;font-weight:500}
.delta-pos{color:var(--navy);font-weight:600}
.delta-neg{color:var(--terra-dark);font-weight:600}

/* Pie charts */
.pies-row{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:20px}
.pie-card{background:#fff;border:1px solid var(--border);padding:24px 26px}
.pie-card h4{font-size:13px;letter-spacing:-.005em;margin-bottom:18px;color:var(--soft-black)}
.pie-wrap{display:grid;grid-template-columns:180px 1fr;gap:24px;align-items:center}
.pie-svg{width:180px;height:180px}
.pie-legend{font-size:11.5px;line-height:1.8}
.pie-legend .row{display:grid;grid-template-columns:14px 1fr auto;gap:8px;align-items:center;padding:2px 0}
.pie-legend .sw{width:11px;height:11px;display:inline-block}
.pie-legend .nm{color:var(--text);font-weight:500}
.pie-legend .wt{color:var(--text-muted);font-weight:600;font-variant-numeric:tabular-nums}

/* Holdings table */
.h-table-wrap{background:#fff;border:1px solid var(--border);margin-top:16px;overflow-x:auto}
.h-table{width:100%;border-collapse:collapse;font-size:13px}
.h-table thead th{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--slate);padding:14px 16px;text-align:right;border-bottom:1px solid var(--border-strong);background:var(--bg-subtle);position:sticky;top:0}
.h-table thead th:first-child,.h-table thead th:nth-child(2){text-align:left}
.h-table tbody td{padding:11px 16px;border-bottom:1px solid var(--rule);text-align:right;font-variant-numeric:tabular-nums;color:var(--text)}
.h-table tbody td:first-child{text-align:left;font-weight:600;color:var(--navy);letter-spacing:.02em;font-size:12.5px}
.h-table tbody td:nth-child(2){text-align:left}
.h-table tbody tr:hover td{background:var(--bg-subtle)}
.h-table .cat-row td{background:#fff;border-top:2px solid var(--border-strong);border-bottom:1px solid var(--border);padding:10px 16px;font-size:10px;letter-spacing:.16em;text-transform:uppercase;font-weight:700;color:var(--slate);text-align:left}
.h-table .cat-row td.eq{color:var(--eq-color)}
.h-table .cat-row td.fi{color:var(--fi-color)}
.h-table .cat-row td.alt{color:var(--alt-color)}
.h-table tfoot td{padding:14px 16px;border-top:2px solid var(--border-strong);font-weight:700;font-size:12.5px;color:var(--soft-black);text-align:right;background:var(--bg-subtle);font-variant-numeric:tabular-nums}
.h-table tfoot td:first-child{text-align:left;letter-spacing:.08em;text-transform:uppercase;font-size:10px;color:var(--slate)}
.h-desc{color:var(--text-muted);font-size:12.5px;line-height:1.55}

/* Section 6: Strategies */
.strat-intro{background:var(--bg-panel);border-left:3px solid var(--terra);padding:24px 30px;margin-bottom:32px}
.strat-intro p{font-size:15px;line-height:1.65;color:var(--text);max-width:780px}
.strat-intro strong{color:var(--navy);font-weight:700}

.strat-layout{display:grid;grid-template-columns:280px 1fr;gap:22px;margin-top:18px;align-items:start}
.strat-list{background:#fff;border:1px solid var(--border);max-height:700px;overflow-y:auto;padding:0}
.strat-list::-webkit-scrollbar{width:6px}
.strat-list::-webkit-scrollbar-track{background:#f5f3ef}
.strat-list::-webkit-scrollbar-thumb{background:#c8c5bd;border-radius:3px}
.strat-item{display:block;width:100%;text-align:left;background:#fff;border:0;border-bottom:1px solid var(--rule);border-left:3px solid transparent;padding:12px 16px;cursor:pointer;transition:background .14s,border-color .14s;font-family:inherit}
.strat-item:last-child{border-bottom:0}
.strat-item:hover{background:var(--bg-subtle)}
.strat-item.active{background:rgba(12,65,96,.06);border-left-color:var(--terra)}
.strat-item.active .si-name{color:var(--navy)}
.strat-item .si-name{font-size:13px;font-weight:700;color:var(--soft-black);letter-spacing:-.005em;line-height:1.3;margin-bottom:4px}
.strat-item .si-meta{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
.strat-item .si-tag{font-size:9px;color:var(--slate);letter-spacing:.1em;text-transform:uppercase;font-weight:600;line-height:1.3}
.strat-item .si-wt{font-size:11px;color:var(--navy);font-weight:700;font-variant-numeric:tabular-nums;white-space:nowrap}
.strat-item.strat-zero{opacity:.55}
.strat-item.strat-zero .si-wt{color:var(--text-faint)}

.strat-detail{background:var(--bg-subtle);border-left:3px solid var(--terra);padding:28px 32px;margin-top:0}
.strat-detail h3{font-size:22px;color:var(--navy);margin-bottom:4px}
.strat-detail .s-series{font-size:11px;color:var(--slate);letter-spacing:.14em;text-transform:uppercase;font-weight:600;margin-bottom:18px}
.strat-detail .wrow{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:22px;padding:14px;background:#fff;border:1px solid var(--border)}
.strat-detail .wcell{text-align:center;padding:10px 6px;border-right:1px solid var(--rule)}
.strat-detail .wcell:last-child{border-right:0}
.strat-detail .wcell-label{font-size:9.5px;color:var(--slate);letter-spacing:.12em;text-transform:uppercase;font-weight:600;margin-bottom:6px}
.strat-detail .wcell-val{font-size:18px;font-weight:800;color:var(--navy);font-variant-numeric:tabular-nums;letter-spacing:-.01em}
.strat-detail .wcell.wzero .wcell-val{color:var(--text-faint);font-weight:500}
.strat-detail .s-block{margin-bottom:20px}
.strat-detail .s-lbl{font-size:10px;color:var(--terra);font-weight:700;letter-spacing:.16em;text-transform:uppercase;margin-bottom:8px}
.strat-detail p{font-size:14px;line-height:1.65;color:var(--text);max-width:820px}

.matrix-wrap{background:#fff;border:1px solid var(--border);overflow-x:auto}
.matrix{width:100%;border-collapse:collapse;font-size:13px;font-variant-numeric:tabular-nums}
.matrix th{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--slate);padding:14px 14px;text-align:center;background:var(--bg-subtle);border-bottom:1px solid var(--border-strong)}
.matrix th:first-child{text-align:left;padding-left:20px}
.matrix td{padding:12px 14px;text-align:center;border-bottom:1px solid var(--rule)}
.matrix td.sn{text-align:left;padding-left:20px;font-weight:600;color:var(--soft-black);font-size:13px;background:#fff !important}

.other-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px}
.other-chip{padding:8px 14px;background:#fff;border:1px solid var(--border);font-size:12px;color:var(--text-muted);font-weight:500;cursor:default}

/* Section 7: Pricing */
.pricing-hero{display:grid;grid-template-columns:1.1fr .9fr;gap:40px;align-items:start;margin-top:12px}
.price-card{background:var(--soft-black);color:#fff;padding:44px 48px;position:relative;overflow:hidden}
.price-card:before{content:"";position:absolute;top:0;left:0;right:0;height:4px;background:var(--terra)}
.price-card .tag{font-size:10px;color:var(--terra);letter-spacing:.2em;text-transform:uppercase;font-weight:700;margin-bottom:14px}
.price-card .amount{font-size:68px;font-weight:900;letter-spacing:-.035em;line-height:1;color:#fff;margin-bottom:6px}
.price-card .amount sub{font-size:16px;color:var(--slate-lt);font-weight:500;letter-spacing:0;text-transform:none;margin-left:10px;vertical-align:4px}
.price-card .sub{font-size:14px;color:rgba(255,255,255,.7);margin-bottom:32px}
.price-card .detail-list{list-style:none}
.price-card .detail-list li{padding:13px 0;border-top:1px solid rgba(255,255,255,.1);display:grid;grid-template-columns:20px 1fr;gap:12px;font-size:14px;color:rgba(255,255,255,.85);line-height:1.5}
.price-card .detail-list li:last-child{border-bottom:1px solid rgba(255,255,255,.1)}
.price-card .detail-list li .m{color:var(--terra);font-weight:700;font-size:14px}
.price-card .detail-list li strong{color:#fff;font-weight:700}

.price-notes{padding:28px 0 0 0}
.price-notes h3{font-size:20px;margin-bottom:16px}
.price-notes p{font-size:14.5px;color:var(--text-muted);line-height:1.65;margin-bottom:16px}

/* Section 8: Additional services */
.svc-grid{display:grid;grid-template-columns:1fr 1fr;gap:22px;margin-top:12px}
.svc-card{background:#fff;border:1px solid var(--border);padding:32px 34px;border-top:3px solid var(--navy)}
.svc-card.alt{border-top-color:var(--terra)}
.svc-card .tag{font-size:10px;color:var(--slate);letter-spacing:.18em;text-transform:uppercase;font-weight:700;margin-bottom:14px}
.svc-card.alt .tag{color:var(--terra)}
.svc-card h3{font-size:22px;margin-bottom:14px;letter-spacing:-.015em;color:var(--soft-black)}
.svc-card p{font-size:14px;line-height:1.65;color:var(--text-muted);margin-bottom:16px}
.svc-card p:last-of-type{margin-bottom:0}
.svc-card ul{list-style:none;margin-top:14px}
.svc-card ul li{padding:10px 0;border-top:1px solid var(--rule);display:grid;grid-template-columns:20px 1fr;gap:12px;font-size:13.5px;line-height:1.5;color:var(--text)}
.svc-card ul li:last-child{border-bottom:1px solid var(--rule)}
.svc-card ul li .m{color:var(--terra);font-weight:700}
.svc-card ul li strong{color:var(--navy);font-weight:700}
.svc-card .cta{margin-top:20px;display:inline-block;padding:11px 22px;background:var(--navy);color:#fff;font-size:12px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;transition:background .18s}
.svc-card .cta:hover{background:var(--navy-dark);color:#fff}
.svc-card.alt .cta{background:var(--terra)}
.svc-card.alt .cta:hover{background:var(--terra-dark)}

/* Investment Committee block */
.ic-block{margin-top:28px;background:linear-gradient(135deg,var(--navy-deep) 0%,var(--navy) 100%);color:#fff;padding:40px 44px;position:relative;overflow:hidden}
.ic-block:before{content:"";position:absolute;top:0;right:0;bottom:0;width:40%;background:linear-gradient(110deg,transparent 0%,rgba(104,134,154,.15) 100%);pointer-events:none}
.ic-block .tag{font-size:10px;color:var(--terra);letter-spacing:.2em;text-transform:uppercase;font-weight:700;margin-bottom:12px;position:relative}
.ic-block h3{font-size:26px;color:#fff;margin-bottom:14px;letter-spacing:-.015em;position:relative;max-width:740px}
.ic-block p{font-size:14.5px;color:rgba(255,255,255,.78);line-height:1.65;max-width:740px;margin-bottom:20px;position:relative}
.ic-feat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:26px;position:relative}
.ic-feat{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);padding:20px 22px}
.ic-feat .n{font-size:10px;color:var(--terra);letter-spacing:.16em;text-transform:uppercase;font-weight:700;margin-bottom:10px}
.ic-feat h4{font-size:14px;color:#fff;margin-bottom:8px;font-weight:700}
.ic-feat p{font-size:12.5px;color:rgba(255,255,255,.7);line-height:1.55;margin:0}

/* Section 9: Disclosures */
.discl-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:0}
.discl-tab{padding:14px 22px;background:transparent;border:0;border-bottom:2px solid transparent;font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);cursor:pointer;transition:color .18s,border-color .18s}
.discl-tab:hover{color:var(--navy)}
.discl-tab.active{color:var(--navy);border-bottom-color:var(--terra)}
.discl-body{background:#fff;padding:40px 44px;border:1px solid var(--border);border-top:0;max-height:640px;overflow-y:auto}
.discl-body::-webkit-scrollbar{width:6px}
.discl-body::-webkit-scrollbar-thumb{background:var(--border-strong)}
.discl-panel{display:none;max-width:780px;font-size:13px;line-height:1.7;color:var(--text)}
.discl-panel.active{display:block}
.discl-panel h4{font-size:13px;margin:20px 0 10px;color:var(--soft-black);text-transform:uppercase;letter-spacing:.1em}
.discl-panel h4:first-child{margin-top:0}
.discl-panel p{margin-bottom:14px}
.discl-panel strong{color:var(--soft-black);font-weight:700}
.discl-panel ul{margin:10px 0 14px 20px;list-style:none}
.discl-panel ul li{padding:3px 0;position:relative;padding-left:14px}
.discl-panel ul li:before{content:"—";position:absolute;left:0;color:var(--slate)}
.discl-panel .defn{display:grid;grid-template-columns:180px 1fr;gap:18px;padding:10px 0;border-top:1px solid var(--rule);font-size:12.5px}
.discl-panel .defn:first-of-type{border-top:0}
.discl-panel .defn dt{font-weight:700;color:var(--navy)}
.discl-panel .defn dd{color:var(--text-muted)}

/* Tooltip */
.tt{position:absolute;background:var(--soft-black);color:#fff;padding:8px 12px;font-size:12px;pointer-events:none;opacity:0;transition:opacity .15s;z-index:1000;white-space:nowrap;font-variant-numeric:tabular-nums;box-shadow:0 6px 20px rgba(0,0,0,.15)}
.tt.show{opacity:1}

/* Compact responsive */
@media (max-width:1100px){
  .app{grid-template-columns:1fr}
  .sidebar{position:relative;height:auto;padding:24px}
  .section{padding:48px 36px}
  .hero{grid-template-columns:1fr}
  .pricing-hero{grid-template-columns:1fr}
  .grid-2,.pies-row,.svc-grid{grid-template-columns:1fr}
  .stepper,.series-grid{grid-template-columns:repeat(2,1fr)}
  .strat-layout{grid-template-columns:1fr}
  .strat-list{max-height:340px}
  .kpi-row{grid-template-columns:repeat(3,1fr)}
  .kpi{border-bottom:1px solid var(--border)}
  .ic-feat-grid{grid-template-columns:1fr}
}
</style>

const STRATEGIES = {"Equity (ACWI Mkt Cap)": {"series": "Equity / Strategic", "short": "Globally diversified equity sleeve mirroring the market-cap breakdown of the MSCI All-Country World Index.", "how": "Holds US Large Blend/Value/Growth (Russell 1000 family), US Mid Cap (Russell Midcap), US Small Cap (Russell 2000), Developed International (MSCI EAFE), and Emerging Markets (MSCI EM). Rebalanced annually to reflect the current market-cap composition of global equity markets.", "why": "Serves as the strategic equity anchor, providing broad global exposure at low cost before tactical strategies are layered on top."}, "Equity Relative Strength": {"series": "Technical / Tactical", "short": "Momentum-based rotation across equity styles and regions, overweighting leaders and underweighting laggards.", "how": "Allocates across Large Blend, Large Value, Large Growth, Mid Cap, Small Cap, International, and Emerging Markets based on relative strength signals. Rebalanced monthly to stay aligned with prevailing trends.", "why": "Adds a disciplined, rules-based tilt toward equity segments showing leadership, with monthly adaptation rather than static style weights."}, "US Factor Strength": {"series": "Fundamental / Tactical", "short": "Tactical allocation across S&P 500 style factors based on real-time risk-adjusted performance versus history.", "how": "Rotates among Quality, Momentum, Low Volatility, High Dividend, Equal Weight, Value, and Growth. Selects the two factors showing the strongest risk-adjusted profile each month, excluding the others entirely.", "why": "Captures factor premia dynamically rather than statically, adapting to shifting market regimes while seeking excess return versus the S&P 500."}, "Asset Class Relative Strength": {"series": "Technical / Tactical", "short": "Momentum-based rotation across a broad opportunity set of equity and fixed income asset classes.", "how": "Collects one-year total return data across asset classes, overweights those outperforming, underweights laggards. Rebalanced monthly to keep pace with evolving asset class leadership.", "why": "The model's largest tactical lever \u2014 provides meaningful flexibility to shift between equities, fixed income, and sub-classes based on durable trend signals."}, "Fed Rate Expectation": {"series": "Technical / Tactical", "short": "Positions the portfolio based on what the short end of the yield curve implies about the Fed's next move.", "how": "Analyzes the relationship between 2-year and 3-month Treasury yields. Overweights fixed income when a rate hike is implied, equities when a cut is implied, stays balanced for neutral signals. Rebalanced monthly.", "why": "Adds a rate-aware overlay that expresses a monetary policy view without requiring a discretionary forecast."}, "Fiscal-Trade Dynamics": {"series": "Macroeconomic / Tactical", "short": "Allocates based on US government spending relative to exports \u2014 a normalized measure of fiscal stance.", "how": "Compares current fiscal expansion against historical norms. Expansionary fiscal conditions favor equity exposure; constrained conditions tilt toward fixed income. Rebalanced monthly.", "why": "Systematically captures the equity-favorable conditions that tend to accompany fiscal expansion, and the credit-favorable conditions of fiscal restraint."}, "Economic Activity": {"series": "Macroeconomic / Tactical", "short": "Equity-versus-fixed-income allocation driven by US economic growth indicators.", "how": "Combines Retail Sales, New Orders, Capacity Utilization, Industrial Production, and Non-Farm Payrolls. Strong growth adds equity exposure; weakening growth shifts to fixed income. Rebalanced monthly.", "why": "Adds a growth-regime overlay grounded in hard economic data rather than sentiment or forecasts."}, "Risk Relative Strength": {"series": "Technical / Tactical", "short": "Binary risk-on / risk-off allocation between global equities and bonds based on relative momentum.", "how": "Compares current relative strength of equities versus bonds against each asset class's historical trend. Rotates fully between the two. Rebalanced monthly.", "why": "Provides a simple but powerful defensive layer \u2014 capable of moving meaningfully out of equities when bonds show superior momentum."}, "Fixed Income (1 Multisector)": {"series": "Fixed Income / Strategic", "short": "Single-holding strategy providing diversified exposure across global fixed income sectors through one comprehensive fund.", "how": "Invests 100% in a fund tracking the Bloomberg Multiverse Total Return Index, covering investment-grade and high-yield bonds from developed and emerging markets. Rebalanced annually.", "why": "Delivers one-ticket broad fixed income exposure, often via an actively managed fund for tactical flexibility within a globally diversified framework."}, "Fixed Income (7 Asset Class)": {"series": "Fixed Income / Strategic", "short": "Diversified strategic sleeve across seven fixed income asset classes for a balanced bond allocation.", "how": "Holds positions across Intermediate Government, Intermediate Core, Bank Loan, Corporate, High Yield, Global, and Emerging Markets bonds. Rebalanced to target weights annually.", "why": "Provides rule-based diversification across the fixed income opportunity set \u2014 especially valuable in more conservative models where bonds drive return."}, "Fixed Income Relative Strength": {"series": "Technical / Tactical", "short": "Momentum-based rotation across fixed income asset classes.", "how": "Allocates across Intermediate Government, Intermediate Core, Bank Loan, Corporate, High Yield, Global, and Emerging Markets Bond based on relative strength. Rebalanced monthly.", "why": "Applies the same momentum discipline that governs equity sleeves to the fixed income side \u2014 rotating toward bond segments showing leadership."}, "Yield Spreads": {"series": "Technical / Tactical", "short": "Dynamic fixed-income allocation driven by credit spread and Treasury yield movements.", "how": "Rotates among High-Yield Bonds, Corporate Bonds, US Treasuries, and Ultra-Short Bonds based on current yield spreads versus their 2-year moving averages. Rebalanced monthly.", "why": "Adds a credit-aware layer to the fixed income allocation \u2014 taking more credit risk when spreads favor it, less when they don't."}, "Duration Management": {"series": "Technical / Tactical", "short": "Adjusts bond portfolio duration based on the shape of the 2- to 10-year Treasury yield curve.", "how": "Analyzes yield curve steepness and inversion. Lengthens duration, shortens duration, or holds neutral based on monthly evaluations of the curve against historical norms.", "why": "A disciplined way to express interest-rate views \u2014 capturing the duration premium when the curve signals opportunity, reducing rate risk when it doesn't."}};

function drawSeriesChart(key){
  const bkey = {CAD1:'B25',CAD2:'B40',CAD3:'B60',CAD4:'B75',CAD5:'B90'}[key];
  const series = DATA.backtest;
  const W = 960, H = 360, pad = {t:16,r:56,b:36,l:66};
  const modelVals = series.map(d => d[key]);
  const benchVals = series.map(d => d[bkey]);
  const maxY = Math.max(...modelVals, ...benchVals);
  const minY = 900;
  const xScale = i => pad.l + (W - pad.l - pad.r) * (i / (series.length-1));
  const yScale = v => pad.t + (H - pad.t - pad.b) * (1 - (v - minY) / (maxY - minY));
  const pathFor = (arr) => arr.map((v,i) => `${i===0?'M':'L'}${xScale(i).toFixed(1)},${yScale(v).toFixed(1)}`).join('');
  const areaFor = (arr) => `M${xScale(0).toFixed(1)},${yScale(minY).toFixed(1)} ` +
    arr.map((v,i) => `L${xScale(i).toFixed(1)},${yScale(v).toFixed(1)}`).join('') +
    ` L${xScale(series.length-1).toFixed(1)},${yScale(minY).toFixed(1)} Z`;

  const allTicks = [1000, 2000, 3000, 4000, 5000, 6000, 7000, 8000, 9000, 10000];
  const yTicks = allTicks.filter(v => v <= maxY && v >= minY);
  const yearMap = new Map();
  series.forEach((d,i) => { const y = d.d.slice(0,4); if(!yearMap.has(y)) yearMap.set(y, i); });
  const xYears = [...yearMap.entries()].filter((_,idx) => idx % 3 === 0);

  const chart = document.getElementById('series-chart');
  const mName = DATA.modelsSummary.find(m=>m.key===key).name;
  chart.innerHTML = `
    <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
      <defs>
        <linearGradient id="modelGrad" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%" stop-color="var(--navy)" stop-opacity=".18"/>
          <stop offset="100%" stop-color="var(--navy)" stop-opacity="0"/>
        </linearGradient>
      </defs>
      ${yTicks.map(v => `
        <line x1="${pad.l}" x2="${W-pad.r}" y1="${yScale(v)}" y2="${yScale(v)}" stroke="#EDEBE6" stroke-width="1"/>
        <text x="${pad.l-10}" y="${yScale(v)+4}" text-anchor="end" font-size="10" fill="#8a939b" font-variant-numeric="tabular-nums">$${v.toLocaleString()}</text>
      `).join('')}
      ${xYears.map(([y,i]) => `
        <text x="${xScale(i)}" y="${H-pad.b+20}" text-anchor="middle" font-size="10" fill="#8a939b" font-variant-numeric="tabular-nums">${y}</text>
      `).join('')}
      <line x1="${pad.l}" x2="${W-pad.r}" y1="${H-pad.b}" y2="${H-pad.b}" stroke="#C8C5BD" stroke-width="1"/>
      <path d="${areaFor(modelVals)}" fill="url(#modelGrad)"/>
      <path d="${pathFor(benchVals)}" fill="none" stroke="var(--slate)" stroke-width="1.4" stroke-dasharray="4 3"/>
      <path d="${pathFor(modelVals)}" fill="none" stroke="var(--navy)" stroke-width="2.2"/>
      <text x="${W-pad.r+5}" y="${yScale(modelVals.at(-1))+4}" font-size="10" fill="var(--navy)" font-weight="700" font-variant-numeric="tabular-nums">$${modelVals.at(-1).toLocaleString()}</text>
      <text x="${W-pad.r+5}" y="${yScale(benchVals.at(-1))+4}" font-size="10" fill="var(--slate)" font-weight="600" font-variant-numeric="tabular-nums">$${benchVals.at(-1).toLocaleString()}</text>
    </svg>`;

  const sw = document.getElementById('series-sw');
  sw.innerHTML = `
    <span><span class="dot" style="background:var(--navy);height:3px;"></span>${mName}</span>
    <span><span class="dot" style="background:var(--slate);height:3px;border-top:1px dashed var(--slate);"></span>Benchmark</span>`;
}

function drawSeriesAnnual(key){
  const ar = DATA.annualReturns;
  const years = ar.years;
  const mVals = ar[key];
  const bVals = ar[key+'_B'];
  const all = [...mVals, ...bVals];
  const maxV = Math.max(...all, 5);
  const minV = Math.min(...all, -5);
  const range = maxV - minV;
  const W = 960, H = 240, pad = {t:16, r:20, b:42, l:44};
  const innerH = H - pad.t - pad.b;
  const groupW = (W - pad.l - pad.r) / years.length;
  const barW = Math.max(6, (groupW - 10) / 2);
  const zeroY = pad.t + innerH * (maxV / range);
  const yFor = v => pad.t + innerH * ((maxV - v) / range);

  const yTicks = [];
  const step = range > 40 ? 10 : (range > 20 ? 5 : 2);
  for(let v = Math.ceil(minV/step)*step; v <= maxV; v += step){ yTicks.push(v); }

  const bars = years.map((y, i) => {
    const x0 = pad.l + i * groupW + (groupW - barW*2 - 2)/2;
    const mv = mVals[i], bv = bVals[i];
    const mY = yFor(Math.max(0, mv));
    const mH = Math.abs(yFor(mv) - yFor(0));
    const bY = yFor(Math.max(0, bv));
    const bH = Math.abs(yFor(bv) - yFor(0));
    const mCenterX = x0 + barW/2;
    const bCenterX = x0 + barW + 2 + barW/2;
    const mLabelY = mv >= 0 ? mY - 3 : mY + mH + 10;
    const bLabelY = bv >= 0 ? bY - 3 : bY + bH + 10;
    return `
      <rect x="${x0.toFixed(1)}" y="${mY.toFixed(1)}" width="${barW.toFixed(1)}" height="${Math.max(0.5,mH).toFixed(1)}" fill="var(--navy)"><title>${y} model: ${mv.toFixed(2)}%</title></rect>
      <rect x="${(x0+barW+2).toFixed(1)}" y="${bY.toFixed(1)}" width="${barW.toFixed(1)}" height="${Math.max(0.5,bH).toFixed(1)}" fill="var(--slate)" opacity=".75"><title>${y} bench: ${bv.toFixed(2)}%</title></rect>
      <text x="${(x0+barW+1).toFixed(1)}" y="${H-pad.b+14}" text-anchor="middle" font-size="10" fill="#8a939b" font-variant-numeric="tabular-nums">${y}</text>
      <text x="${mCenterX.toFixed(1)}" y="${mLabelY.toFixed(1)}" text-anchor="middle" font-size="8.5" fill="var(--navy)" font-weight="700" font-variant-numeric="tabular-nums">${mv.toFixed(1)}</text>
      <text x="${bCenterX.toFixed(1)}" y="${bLabelY.toFixed(1)}" text-anchor="middle" font-size="8.5" fill="#5a6670" font-weight="600" font-variant-numeric="tabular-nums">${bv.toFixed(1)}</text>
    `;
  }).join('');

  const gridLines = yTicks.map(v => `
    <line x1="${pad.l}" x2="${W-pad.r}" y1="${yFor(v)}" y2="${yFor(v)}" stroke="${v===0?'#C8C5BD':'#EDEBE6'}" stroke-width="${v===0?1:0.6}"/>
    <text x="${pad.l-6}" y="${(yFor(v)+3).toFixed(1)}" text-anchor="end" font-size="10" fill="#8a939b" font-variant-numeric="tabular-nums">${v}%</text>
  `).join('');

  document.getElementById('series-annual-bars').innerHTML = `
    <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet" style="width:100%;height:240px;display:block;">
      ${gridLines}
      ${bars}
    </svg>`;
}

function drawRollingChart(){
  const key='CAD3', bkey='B60';
  const series = DATA.backtest;
  const mNavs = series.map(d => d[key]);
  const bNavs = series.map(d => d[bkey]);
  const n = series.length;
  // Build rolling 12-month returns (start at month 12)
  const rolling = [];
  for(let i = 12; i < n; i++){
    const m = (mNavs[i]/mNavs[i-12] - 1) * 100;
    const b = (bNavs[i]/bNavs[i-12] - 1) * 100;
    rolling.push({d: series[i].d, m, b, xs: m - b, srcIdx: i});
  }

  const W = 960, Htop = 260, Hbot = 150, gap = 20, H = Htop + gap + Hbot;
  const pad = {l:60, r:56, t:16, b:24};

  // Top panel: two lines
  const topMax = Math.max(...rolling.map(r => Math.max(r.m, r.b))) * 1.05;
  const topMin = Math.min(...rolling.map(r => Math.min(r.m, r.b))) * 1.05;
  const topRange = topMax - topMin;
  const xScale = i => pad.l + (W - pad.l - pad.r) * (i / (rolling.length - 1));
  const yScaleTop = v => pad.t + (Htop - pad.t - pad.b) * (1 - (v - topMin) / topRange);

  const pathTop = (fn) => rolling.map((r,i) => `${i===0?'M':'L'}${xScale(i).toFixed(1)},${yScaleTop(fn(r)).toFixed(1)}`).join('');

  // Top panel y ticks: derive round numbers spanning top range
  const topStep = topRange > 40 ? 10 : (topRange > 20 ? 5 : 2);
  const topTicks = [];
  for(let v = Math.ceil(topMin/topStep)*topStep; v <= topMax; v += topStep){ topTicks.push(v); }

  // Bottom panel: excess return area chart
  const botY0 = Htop + gap;
  const xsMax = Math.max(...rolling.map(r => r.xs), 2) * 1.1;
  const xsMin = Math.min(...rolling.map(r => r.xs), -2) * 1.1;

  const yScaleBot = v => botY0 + pad.t + (Hbot - pad.t - pad.b) * (1 - (v - xsMin) / xsRange);

  for(let v = Math.ceil(xsMin/botStep)*botStep; v <= xsMax; v += botStep){ botTicks.push(v); }

  const yearTicks = xYearTicks(rolling, 3);

  const latest = rolling.at(-1);

  document.getElementById('ex-rolling-chart').innerHTML = `
    <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">

        <linearGradient id="xsPosGrad" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%" stop-color="#B4654A" stop-opacity=".55"/>
          <stop offset="100%" stop-color="#B4654A" stop-opacity="0"/>
        </linearGradient>
      </defs>

      <!-- TOP PANEL gridlines -->
      ${topTicks.map(v => `
        <line x1="${pad.l}" x2="${W-pad.r}" y1="${yScaleTop(v).toFixed(1)}" y2="${yScaleTop(v).toFixed(1)}" stroke="${v===0?'#C8C5BD':'#EDEBE6'}" stroke-width="${v===0?1:0.6}"/>

      <path d="${pathTop(r=>r.b)}" fill="none" stroke="#68869A" stroke-width="1.3" stroke-dasharray="4 3" opacity=".85"/>
      <path d="${pathTop(r=>r.m)}" fill="none" stroke="#0C4160" stroke-width="1.8"/>

}

// ============ Annualized Total Return Since Inception ============
function drawStdevChart(){
  const key='CAD3', bkey='B60';
  const series = DATA.backtest;
  const mNavs = series.map(d => d[key]);
  const bNavs = series.map(d => d[bkey]);
  const n = series.length;

  // 1) Monthly returns (in percent) — skip month 0
  const mRets = [];
  const bRets = [];
  for(let i = 1; i < n; i++){
    mRets.push((mNavs[i]/mNavs[i-1] - 1) * 100);
    bRets.push((bNavs[i]/bNavs[i-1] - 1) * 100);
  }

  // 2) Rolling 12-month annualized standard deviation (sample stdev × √12)
  const SQRT12 = Math.sqrt(12);
  const pts = [];
  for(let k = 11; k < mRets.length; k++){
    const mSlice = mRets.slice(k - 11, k + 1);
    const bSlice = bRets.slice(k - 11, k + 1);
    const mMean = mSlice.reduce((s,v)=>s+v,0) / 12;
    const bMean = bSlice.reduce((s,v)=>s+v,0) / 12;
    const mVar = mSlice.reduce((s,v)=>s+(v-mMean)**2,0) / 11;
    const bVar = bSlice.reduce((s,v)=>s+(v-bMean)**2,0) / 11;
    const mAnn = Math.sqrt(mVar) * SQRT12;
    const bAnn = Math.sqrt(bVar) * SQRT12;
    pts.push({d: series[k+1].d, m: mAnn, b: bAnn, delta: mAnn - bAnn});
  }

  const W = 960, Htop = 260, Hbot = 150, gap = 20, H = Htop + gap + Hbot;
  const pad = {l:60, r:56, t:16, b:24};

  // Top panel: standard deviation is always ≥ 0, so range starts at 0
  const topMax = Math.max(...pts.map(p => Math.max(p.m, p.b))) * 1.08;
  const topMin = 0;
  const topRange = topMax - topMin;
  const xScale = i => pad.l + (W - pad.l - pad.r) * (i / (pts.length - 1));
  const yScaleTop = v => pad.t + (Htop - pad.t - pad.b) * (1 - (v - topMin) / topRange);
  const pathTop = (fn) => pts.map((p,i) => `${i===0?'M':'L'}${xScale(i).toFixed(1)},${yScaleTop(fn(p)).toFixed(1)}`).join('');

  const topStep = topRange > 20 ? 5 : (topRange > 10 ? 2 : 1);
  const topTicks = [];
  for(let v = 0; v <= topMax; v += topStep){ topTicks.push(v); }

  // Bottom panel: delta can be positive or negative
  const botY0 = Htop + gap;
  const deltaMax = Math.max(...pts.map(p => p.delta), 1) * 1.15;
  const deltaMin = Math.min(...pts.map(p => p.delta), -1) * 1.15;
  const deltaRange = deltaMax - deltaMin;
  const yScaleBot = v => botY0 + pad.t + (Hbot - pad.t - pad.b) * (1 - (v - deltaMin) / deltaRange);

  const zeroYBot = yScaleBot(0);
  const areaPath = `M${xScale(0).toFixed(1)},${zeroYBot.toFixed(1)} ` +
    pts.map((p,i) => `L${xScale(i).toFixed(1)},${yScaleBot(p.delta).toFixed(1)}`).join('') +
    ` L${xScale(pts.length-1).toFixed(1)},${zeroYBot.toFixed(1)} Z`;

  const botStep = deltaRange > 10 ? 2 : 1;
  const botTicks = [];
  for(let v = Math.ceil(deltaMin/botStep)*botStep; v <= deltaMax; v += botStep){ botTicks.push(v); }

  const yearTicks = xYearTicks(pts, 3);
  const latest = pts.at(-1);

  document.getElementById('ex-stdev-chart').innerHTML = `
    <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
      <defs>
        <linearGradient id="stdevDeltaGrad" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%" stop-color="#B4654A" stop-opacity=".55"/>
          <stop offset="100%" stop-color="#B4654A" stop-opacity="0"/>
        </linearGradient>
      </defs>

      ${topTicks.map(v => `
        <line x1="${pad.l}" x2="${W-pad.r}" y1="${yScaleTop(v).toFixed(1)}" y2="${yScaleTop(v).toFixed(1)}" stroke="#EDEBE6" stroke-width="0.6"/>
        <text x="${pad.l-8}" y="${(yScaleTop(v)+3).toFixed(1)}" text-anchor="end" font-size="10" fill="#8a939b" font-variant-numeric="tabular-nums">${v}%</text>
      `).join('')}
      <path d="${pathTop(p=>p.b)}" fill="none" stroke="#68869A" stroke-width="1.3" stroke-dasharray="4 3" opacity=".85"/>
      <path d="${pathTop(p=>p.m)}" fill="none" stroke="#0C4160" stroke-width="1.8"/>
      <text x="${(W-pad.r+5)}" y="${(yScaleTop(latest.m)+4).toFixed(1)}" font-size="10" fill="#0C4160" font-weight="700" font-variant-numeric="tabular-nums">${latest.m.toFixed(1)}%</text>
      <text x="${(W-pad.r+5)}" y="${(yScaleTop(latest.b)+4).toFixed(1)}" font-size="10" fill="#68869A" font-weight="600" font-variant-numeric="tabular-nums">${latest.b.toFixed(1)}%</text>
      <text x="${pad.l}" y="${(pad.t-2).toFixed(1)}" font-size="10" fill="#8a939b" letter-spacing="1.5" font-weight="600" style="text-transform:uppercase;">Rolling 1Y Annualized Standard Deviation</text>

      ${botTicks.map(v => `
        <line x1="${pad.l}" x2="${W-pad.r}" y1="${yScaleBot(v).toFixed(1)}" y2="${yScaleBot(v).toFixed(1)}" stroke="${v===0?'#C8C5BD':'#EDEBE6'}" stroke-width="${v===0?1:0.6}"/>
        <text x="${pad.l-8}" y="${(yScaleBot(v)+3).toFixed(1)}" text-anchor="end" font-size="10" fill="#8a939b" font-variant-numeric="tabular-nums">${v}%</text>
      `).join('')}
      <path d="${areaPath}" fill="url(#stdevDeltaGrad)"/>
      <path d="${pts.map((p,i) => `${i===0?'M':'L'}${xScale(i).toFixed(1)},${yScaleBot(p.delta).toFixed(1)}`).join('')}" fill="none" stroke="#B4654A" stroke-width="1.4"/>
      <text x="${(W-pad.r+5)}" y="${(yScaleBot(latest.delta)+4).toFixed(1)}" font-size="10" fill="#B4654A" font-weight="700" font-variant-numeric="tabular-nums">${latest.delta>=0?'+':''}${latest.delta.toFixed(2)}%</text>
      <text x="${pad.l}" y="${(botY0+pad.t-2).toFixed(1)}" font-size="10" fill="#8a939b" letter-spacing="1.5" font-weight="600" style="text-transform:uppercase;">Δ Std. Dev. (Model − Benchmark)</text>

      ${yearTicks.map(([y,i]) => `<text x="${xScale(i).toFixed(1)}" y="${(H-4).toFixed(1)}" text-anchor="middle" font-size="10" fill="#8a939b" font-variant-numeric="tabular-nums">${y}</text>`).join('')}
    </svg>`;
}

// ============ Market Regime Analysis — Up / Down Capture ============
function detectRegimes(navs, threshold){
  const regimes = [];
  let mode = 'bull';
  let startIdx = 0;
  let peak = navs[0], peakIdx = 0;
  let trough = navs[0], troughIdx = 0;

  for(let i = 1; i < navs.length; i++){
    const v = navs[i];
    if(mode === 'bull'){
      if(v > peak){ peak = v; peakIdx = i; }
      const dd = (v - peak) / peak;
      if(dd <= -threshold){
        // Close out the bull regime at the peak
        regimes.push({type:'bull', startIdx, endIdx: peakIdx});
        mode = 'bear';
        startIdx = peakIdx;
        trough = v;
        troughIdx = i;
      }
    } else {
      if(v < trough){ trough = v; troughIdx = i; }
      if(v >= peak){
        regimes.push({type:'bear', startIdx, endIdx: troughIdx});
        mode = 'bull';
        startIdx = troughIdx;
        peak = v;
        peakIdx = i;
      }
    }
  }
  regimes.push({type: mode, startIdx, endIdx: navs.length - 1, open: true});
  return regimes;
}

function drawRegimeAnalysis(){
  const key='CAD3', bkey='B60';
  const series = DATA.backtest;
  const bNavs = series.map(d => d[bkey]);
  const mNavs = series.map(d => d[key]);

  const regimes = detectRegimes(bNavs, 0.10);

  // === Render the TIMELINE ===
  const W = 960, H = 120;
  const pad = {l:0, r:0, t:20, b:24};
  const n = series.length;
  const xScale = i => pad.l + (W - pad.l - pad.r) * (i / (n - 1));

  const bands = regimes.map(r => {
    const x1 = xScale(r.startIdx);
    const x2 = xScale(r.endIdx);
    const fill = r.type === 'bull' ? 'rgba(12,65,96,.22)' : 'rgba(180,101,74,.25)';
    return `<rect x="${x1.toFixed(1)}" y="${pad.t}" width="${Math.max(1,(x2-x1)).toFixed(1)}" height="${(H-pad.t-pad.b)}" fill="${fill}"/>`;
  }).join('');

  // Overlay benchmark path to help visually map the regimes
  const pnavMax = Math.max(...bNavs);
  const pnavMin = Math.min(...bNavs);
  const yBench = v => pad.t + (H - pad.t - pad.b) * (1 - (v - pnavMin)/(pnavMax - pnavMin)) * 0.9 + 4;
  const benchPath = bNavs.map((v,i) => `${i===0?'M':'L'}${xScale(i).toFixed(1)},${yBench(v).toFixed(1)}`).join('');

  const yearTicks = xYearTicks(series, 3);

  document.getElementById('ex-regime-timeline').innerHTML = `
    <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
      ${bands}
      <path d="${benchPath}" fill="none" stroke="#1A1A1A" stroke-width="1.1" opacity=".65"/>
      <text x="${pad.l+2}" y="${14}" font-size="10" fill="#8a939b" letter-spacing="1.4" font-weight="600" style="text-transform:uppercase;">Benchmark Path With Regime Overlay</text>
      ${yearTicks.map(([y,i]) => `<text x="${xScale(i).toFixed(1)}" y="${(H-6).toFixed(1)}" text-anchor="middle" font-size="10" fill="#8a939b" font-variant-numeric="tabular-nums">${y}</text>`).join('')}
    </svg>`;

  // === Render the TABLE ===
  const t = document.getElementById('ex-regime-table');
  const rows = regimes.map(r => {
    const start = series[r.startIdx].d;
    const end = series[r.endIdx].d;
    const months = r.endIdx - r.startIdx;
    const mNavStart = mNavs[r.startIdx], mNavEnd = mNavs[r.endIdx];
    const bNavStart = bNavs[r.startIdx], bNavEnd = bNavs[r.endIdx];
    const mRet = (mNavEnd / mNavStart - 1) * 100;
    const bRet = (bNavEnd / bNavStart - 1) * 100;
    // Capture ratio: model_ret / bench_ret (only meaningful if same sign)
    let capture = null;
    let captureLabel = '';
    if(r.type === 'bull'){
      if(bRet > 0) capture = (mRet / bRet) * 100;
      captureLabel = 'Up Capture';
    } else {
      if(bRet < 0) capture = (mRet / bRet) * 100;
      captureLabel = 'Down Capture';
    }
    return {r, start, end, months, mRet, bRet, capture, captureLabel};
  });

  // Classify capture for color treatment
  // For bulls: up capture > 100% is ideal (navy)
  // For bears: down capture < 100% is ideal (navy) — meaning model fell less in pct terms
  const html = `
    <thead>
      <tr>
        <th>Regime</th>
        <th>Period</th>
        <th>Months</th>
        <th>Benchmark</th>
        <th>Model</th>
        <th>Δ</th>
        <th>Capture Ratio</th>
      </tr>
    </thead>
    <tbody>
      ${rows.map(row => {
        const {r, start, end, months, mRet, bRet, capture, captureLabel} = row;
        const pillClass = r.type === 'bull' ? 'bull' : 'bear';
        const pillLabel = r.type === 'bull' ? (r.open ? 'Bull (current)' : 'Bull') : (r.open ? 'Bear (current)' : 'Bear');
        const delta = mRet - bRet;
        let captureHtml = '—';
        let captureClass = 'capture-neutral';
        if(capture !== null){
          // Good: bull with capture>100 (model captured more upside) OR bear with capture<100 (model lost less)
          const isGood = (r.type==='bull' && capture > 100) || (r.type==='bear' && capture < 100);
          captureClass = isGood ? 'capture-good' : 'capture-bad';
          captureHtml = `${capture.toFixed(0)}% <span style="font-weight:500;color:var(--text-muted);font-size:10.5px;letter-spacing:.06em;">${captureLabel}</span>`;
        } else {
          captureHtml = `<span style="color:var(--text-muted);font-size:11px;">mixed sign</span>`;
        }
        return `
          <tr>
            <td><span class="regime-pill ${pillClass}">${pillLabel}</span></td>
            <td style="color:var(--text-muted);font-size:12px;">${formatDateShort(start)} – ${formatDateShort(end)}</td>
            <td>${months}</td>
            <td>${bRet>=0?'+':''}${bRet.toFixed(1)}%</td>
            <td>${mRet>=0?'+':''}${mRet.toFixed(1)}%</td>
            <td>${delta>=0?'+':''}${delta.toFixed(1)}%</td>
            <td class="${captureClass}">${captureHtml}</td>
          </tr>`;
      }).join('')}
    </tbody>`;
  t.innerHTML = html;
}

function drawPie(svgId, rows){
  const total = rows.reduce((s,r) => s+r.weight, 0);
  const R = 85, r0 = 48;
  let a0 = -Math.PI/2;
  const paths = rows.map(row => {
    const frac = row.weight / total;
    const a1 = a0 + frac * Math.PI*2;
    const x0 = Math.cos(a0)*R, y0 = Math.sin(a0)*R;
    const x1 = Math.cos(a1)*R, y1 = Math.sin(a1)*R;
    const xi1 = Math.cos(a1)*r0, yi1 = Math.sin(a1)*r0;
    const xi0 = Math.cos(a0)*r0, yi0 = Math.sin(a0)*r0;
    const large = frac > .5 ? 1 : 0;
    const d = `M${x0.toFixed(2)},${y0.toFixed(2)} A${R},${R} 0 ${large} 1 ${x1.toFixed(2)},${y1.toFixed(2)} L${xi1.toFixed(2)},${yi1.toFixed(2)} A${r0},${r0} 0 ${large} 0 ${xi0.toFixed(2)},${yi0.toFixed(2)} Z`;
    a0 = a1;
    return `<path d="${d}" fill="${row.color}" stroke="#fff" stroke-width=".6"><title>${row.name}: ${row.weight.toFixed(1)}%</title></path>`;
  });
  document.getElementById(svgId).innerHTML = paths.join('');
}

// Compute annual returns from monthly NAVs for every calendar year from inception.
// First year is partial (from inception date to Dec 31); last year may be YTD.
function computeAnnualReturnsFromNavs(series, key){
  const yearEndNav = {};
  series.forEach(d => {
    const [y, m] = d.d.split('-');
    if(m === '12') yearEndNav[y] = d[key];
  });
  const firstYear = parseInt(series[0].d.slice(0,4), 10);
  const firstNav = series[0][key];
  const lastObs = series[series.length-1];
  const lastYear = parseInt(lastObs.d.slice(0,4), 10);
  const lastNav = lastObs[key];

  const rows = [];
  for(let y = firstYear; y <= lastYear; y++){
    let startNav, endNav, label, partial = false;
    if(y === firstYear){
      startNav = firstNav;
      endNav = yearEndNav[y] !== undefined ? yearEndNav[y] : lastNav;
      label = yearEndNav[y] !== undefined ? `${y}*` : `${y} YTD*`;
      partial = true;
    } else if(y === lastYear && yearEndNav[y] === undefined){
      startNav = yearEndNav[y-1];
      endNav = lastNav;
      label = `${y} YTD`;
      partial = true;
    } else {
      startNav = yearEndNav[y-1];
      endNav = yearEndNav[y];
      label = String(y);
    }
    if(startNav && endNav){
      rows.push({year: label, ret: (endNav/startNav - 1) * 100, partial});
    }
  }
  return rows;
}

function drawAnnualReturns(){
  const series = DATA.backtest;
  const modelRows = computeAnnualReturnsFromNavs(series, 'CAD3');
  const benchRows = computeAnnualReturnsFromNavs(series, 'B60');
  // newest first
  const rows = modelRows.map((r, i) => ({
    year: r.year,
    m: r.ret,
    b: benchRows[i].ret,
    partial: r.partial,
  })).reverse();

  let html = `<thead><tr><th>Year</th><th>Model</th><th>Benchmark</th><th>Δ</th><th>Year</th><th>Model</th><th>Benchmark</th><th>Δ</th></tr></thead><tbody>`;
  const half = Math.ceil(rows.length / 2);
  for(let i = 0; i < half; i++){
    const i2 = i + half;
    const make = (k) => {
      if(k >= rows.length) return '<td></td><td></td><td></td><td></td>';
      const r = rows[k];
      const delta = r.m - r.b;
      const dc = delta >= 0 ? 'delta-pos' : 'delta-neg';
      return `<td>${r.year}</td><td>${r.m.toFixed(2)}%</td><td>${r.b.toFixed(2)}%</td><td class="${dc}">${delta>=0?'+':''}${delta.toFixed(2)}%</td>`;
    };
    html += `<tr>${make(i)}${make(i2)}</tr>`;
  }
  html += '</tbody>';
  document.getElementById('ar-table').innerHTML = html;
}

        <p>The performance of an index is calculated by taking a weighted average of the stated target weights and the securities' and/or indexes' total return, assuming reinvestment of all dividends and other distributions on the related ex-date, since the latest rebalance date. The index(es) portrayed in this report are assumed to rebalance to the exact designated weights on a daily, weekly, monthly, quarterly or annual basis, whichever you and/or Modelist selected in generating this report. The performance illustrated in this report may assume that rebalancing occurred in a manner different from how an Advisor rebalances a client portfolio. An Advisor may recommend rebalancing when an asset class varies from its targeted allocation. The way an Advisor invests dividends may be different than how the index(es) invest dividends.</p>

      <div class="discl-panel" id="p5">
        <h4>Investment Risks</h4>
        <p><strong>International / Emerging Market Equities:</strong> Investing in international securities involves special additional risks. These risks include, but are not limited to, currency risk, political risk, and risk associated with varying accounting standards. Investing in emerging markets may accentuate these risks.</p>
        <p><strong>Sector Strategies:</strong> Portfolios that invest exclusively in one sector or industry involve additional risks. The lack of industry diversification subjects the investor to increased industry-specific risks.</p>
        <p><strong>Non-Diversified Strategies:</strong> Portfolios that invest a significant percentage of assets in a single issuer involve additional risks, including share price fluctuations, because of the increased concentration of investments.</p>
        <p><strong>Small Cap Equities:</strong> Portfolios that invest in stocks of small companies involve additional risks. Smaller companies typically have a higher risk of failure and are not as well-established as larger blue-chip companies. Historically, smaller-company stocks have experienced a greater degree of market volatility than the overall market average.</p>
        <p><strong>Mid-Cap Equities:</strong> Portfolios that invest in companies with market capitalization below $10 billion involve additional risks. The securities of these companies may be more volatile and less liquid than the securities of larger companies.</p>
        <p><strong>High-Yield Bonds:</strong> Portfolios that invest in lower-rated debt securities (commonly referred to as junk bonds) involve additional risks because of the lower credit quality of the securities in the portfolio. The investor should be aware of the possible higher level of volatility, and increased risk of default.</p>
        <p><strong>Tax-Free Municipal Bonds:</strong> The investor should note that the income from tax-free municipal bond funds may be subject to state and local taxation and the Alternative Minimum Tax.</p>
        <p><strong>Bonds:</strong> Bonds are subject to interest rate risk. As the prevailing level of bond interest rates rise, the value of bonds already held in a portfolio declines. Portfolios that hold bonds are subject to declines and increases in value due to general changes in interest rates.</p>
        <p><strong>Bank Loan / Senior Debt:</strong> Bank loans and senior loans are impacted by the risks associated with fixed income in general, including interest rate risk and default risk. They are often non-investment grade, therefore, the risk of default is high. These securities are also relatively illiquid. Managed products that invest in bank loans/senior debt are often highly leveraged, producing a high risk of return volatility.</p>
        <p><strong>Short Positions:</strong> When a short position moves unfavorably, the losses are theoretically unlimited. The broker may demand more collateral and a manager might have to close out a short position at an inopportune time to limit further losses.</p>
        <p><strong>Long-Short:</strong> Due to strategies used by long-short funds, which may include but are not limited to leverage, short selling, short-term trading, and investing in derivatives, these funds may have greater risk, volatility, and expenses than those focusing on traditional investment strategies.</p>
        <p><strong>Liquidity Risk:</strong> Closed-end fund, ETF, and HOLDR trading may be halted due to market conditions, impacting an investor's ability to sell a fund.</p>
        <p><strong>Market Price Risk:</strong> The market price of ETFs, HOLDRs, and closed-end funds traded on the secondary market is subject to the forces of supply and demand and thus independent of the NAV. This can result in the market price trading at a premium or discount to the NAV, which will affect an investor's value.</p>
        <p><strong>Market Risk:</strong> The market price of ETFs and HOLDRs can fluctuate because of several factors, such as security-specific factors or general investor sentiment. Therefore, investors should be aware of the prospect of market fluctuations and the impact it may have on the market price.</p>
        <p><strong>Money Market Funds:</strong> Investments in these funds are not guaranteed by the FDIC or any other government agency. You can lose money by investing in these funds. The fund strives to preserve your investment, however, it can not guarantee to do so.</p>

      <div class="discl-panel" id="p6">
        <h4>Definitions</h4>
        <div class="defn"><dt>Alpha</dt><dd>A measure of an investment's performance compared to a benchmark, indicating the risk-adjusted excess return of the investment relative to the return of the benchmark.</dd></div>
        <div class="defn"><dt>Annualized Return</dt><dd>The geometric average amount of money earned by an investment each year over a given time period, expressed as a percentage.</dd></div>
        <div class="defn"><dt>Beta</dt><dd>A measure of the volatility, or systematic risk, of an investment compared to the benchmark.</dd></div>
        <div class="defn"><dt>Information Ratio</dt><dd>A risk-adjusted performance measure that is defined as the excess return of an investment divided by the tracking error.</dd></div>
        <div class="defn"><dt>Maximum Drawdown</dt><dd>The maximum observed loss from a peak to a trough of an investment, before a new peak is attained, measured as a percentage.</dd></div>
        <div class="defn"><dt>Rolling Period Over/Under Performance</dt><dd>The annualized total excess return (if positive) or underperformance (if negative) of an investment compared to its benchmark, evaluated on a monthly basis over the indicated look-back period.</dd></div>
        <div class="defn"><dt>Sharpe Ratio</dt><dd>A risk-adjusted measure that is calculated by dividing the excess return of an investment by its standard deviation, indicating the average return earned in excess of the risk-free rate per unit of volatility.</dd></div>
        <div class="defn"><dt>Standard Deviation</dt><dd>A measure of the dispersion of a set of data from its mean, calculated as the square root of variance, indicating the historical volatility of an investment.</dd></div>
        <div class="defn"><dt>Total Return</dt><dd>The actual rate of return of an investment over a given period, including both capital appreciation and any dividends or interest payments.</dd></div>
        <div class="defn"><dt>Tracking Error</dt><dd>A measure of how closely an investment follows its benchmark, calculated as the standard deviation of the difference between the investment and benchmark returns.</dd></div>
